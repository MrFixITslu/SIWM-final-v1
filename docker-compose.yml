version: '3.8'

services:
  siwm-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: siwm-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4001
      # Connects to the existing PostgreSQL container on 'proxy_network'
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    networks:
      - proxy_network

  siwm-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: siwm-frontend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      - siwm-backend
    networks:
      - proxy_network

networks:
  proxy_network:
    external: true

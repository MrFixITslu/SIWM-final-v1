services:
  siwm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siwm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # If your Nginx Proxy Manager host for siwm.v79sl.duckdns.org already
      # targets a specific port (e.g. 3060 from an earlier deployment), set
      # PORT to that same value in .env so you don't have to touch NPM.
      - PORT=${PORT:-4001}
    networks:
      - proxy_network
    # No ports: published to the host on purpose - Nginx Proxy Manager reaches
    # this container over proxy_network by container name + PORT, the same
    # pattern used by this operator's other apps (FFPRO, GIBD, Tiquet).

networks:
  proxy_network:
    external: true
